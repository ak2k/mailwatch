name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast uv-native feedback on every push — catches Python regressions
  # in under a minute. The `nix` job below duplicates these checks inside
  # a fuller flake build, but running the Python tooling directly gives
  # faster signal + cleaner PR annotations.
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked --group dev
      - run: uv run ruff check --output-format=github .
      - run: uv run ruff format --check .
      - run: uv run mypy --junit-xml mypy.xml mailwatch
      - if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: mypy.xml
          check_name: mypy

  python-test:
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked --group dev
      - run: uv run pytest --cov=mailwatch --cov-report=xml --junitxml=pytest.xml
      - if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: pytest.xml
          check_name: pytest
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Full flake check — exercises uv2nix build, re-runs Python tests under
  # Nix, plus statix/nixfmt/deadnix. Matrix covers both Linux architectures
  # (ubuntu-24.04-arm matches the aarch64-linux deploy target).
  nix:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest       # x86_64-linux
          - ubuntu-24.04-arm    # aarch64-linux (deploy target)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v17
        with:
          name: ak2k
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Flake check (builds + all tests + all nix lints)
        run: nix flake check -L
