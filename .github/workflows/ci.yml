name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write        # mikepenz/action-junit-report creates check runs
  actions: write       # nix-community/cache-nix-action purges old caches

jobs:
  # Fast uv-native feedback on every push — catches Python regressions
  # in under a minute. The `nix` job below duplicates these checks inside
  # a fuller flake build, but running the Python tooling directly gives
  # faster signal + cleaner PR annotations.
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked --group dev
      - run: uv run ruff check --output-format=github .
      - run: uv run ruff format --check .
      - run: uv run mypy --junit-xml mypy.xml mailwatch
      - if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: mypy.xml
          check_name: mypy

  # pytest + coverage both run inside the `nix` job below via
  # `nix flake check`. No separate python-test job — duplicating it
  # outside Nix would force apt-installing WeasyPrint's native deps
  # (libpango, libcairo, …) on the runner, which Nix already provides
  # for free via the flake-level weasyprintNativeLibs path.

  # Full flake check — exercises uv2nix build, re-runs Python tests under
  # Nix, plus statix/nixfmt/deadnix. Matrix covers both Linux architectures
  # (ubuntu-24.04-arm matches the aarch64-linux deploy target).
  #
  # Layered store read order: local /nix/store → GHA cache (cache-nix-action)
  # → Cachix → build from source. cache-nix-action is keyed per-(os,job) so
  # matrix jobs don't race on the first-writer-wins save.
  nix:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest       # x86_64-linux
          - ubuntu-24.04-arm    # aarch64-linux (deploy target)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'uv.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ runner.arch }}-
          gc-max-store-size-linux: 5368709120   # 5 GB per scope
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-
          purge-created: 604800                 # 7 days

      - uses: cachix/cachix-action@v17
        with:
          name: ak2k
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Flake check (builds + all tests + all nix lints)
        run: nix flake check -L
