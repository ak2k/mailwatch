<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}mailwatch{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-title" href="/">mailwatch</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="/">Home</a>
        <a href="/tracking">Track a letter</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>mailwatch &middot; self-hosted USPS IMb tracker &middot;
      <a href="https://github.com/ak2k/mailwatch">source</a>
    </p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
