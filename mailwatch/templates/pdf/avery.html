.page {
    width: {{ tpl.page_w }}in;
    height: {{ tpl.page_h }}in;
    page-break-after: always;
    position: relative;
}

.label {
    width: {{ tpl.label_w }}in;
    height: {{ tpl.label_h }}in;
    max-width: {{ tpl.label_w }}in;
    max-height: {{ tpl.label_h }}in;
    overflow: hidden;
    position: absolute;
    padding: 0.1in;
}

.usps-barcode {
    font-family: "USPSIMBStandard";
    font-size: 16pt;
    /* No gap below — HR digit row tucks directly under the bars and is
       visually part of the barcode cluster, separated from the recipient
       by the HR row's own margin-bottom. */
    margin-bottom: 0;
}

.barcode-humanreadable {
    /* Small reference row: sits tight under the bars, then adds space
       before the recipient address so the numeric code reads as part
       of the barcode (not the address). */
    font-size: 6pt;
    line-height: 1;
    margin-bottom: 0.12in;
}

.recipient-text {
    font-family: "DejaVu Serif", serif;
}

</style>
</head>
<body>
    {% for page in pages %}
    <div class="page">
        {% for label in page %}
        <div class="label" style="top: {{ tpl.y0 + (label.row - 1) * tpl.dy }}in; left: {{ tpl.x0 + (label.col - 1) * tpl.dx }}in;">
            <div class="usps-barcode">{{ label.barcode_bars }}</div>
            {% if label.human_readable %}
            <div class="barcode-humanreadable">{{ label.human_readable_text }}</div>
            {% endif %}
            <div class="recipient-text">
                {% for line in label.recipient_lines %}{{ line }}<br/>
                {% endfor %}
            </div>
        </div>
        {% endfor %}
    </div>
    {% endfor %}
</body>
</html>
