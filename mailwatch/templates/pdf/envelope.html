<!DOCTYPE html>
<html>
<head>

	<title>Envelope</title>

<style>
/* @page size comes from mailwatch.layouts — one spec per envelope size.
   The block geometry below also reads from spec, so adding a new size
   means one row in ENVELOPES, not a template edit. */

    size: {{ spec.w }}in {{ spec.h }}in;
    margin: 0;
}

* {
    box-sizing: border-box;
}

    margin: 0;
}

}

.envelope {
    position: relative;
    width: {{ spec.w }}in;
    height: {{ spec.h }}in;
    page-break-after: always;
}

/* Each of the three blocks declares its max extent and clips overflow, so
   rendered content cannot escape the rectangle _validate() proved was
   collision-free at module load. */
.sender {
    position: absolute;
    left: {{ spec.sender.x }}in;
    bottom: {{ spec.sender.y }}in;
    width: {{ spec.sender.w }}in;
    height: {{ spec.sender.h }}in;
    max-width: {{ spec.sender.w }}in;
    max-height: {{ spec.sender.h }}in;
    overflow: hidden;
    font-family: "DejaVu Serif", serif;
    font-size: 10pt;
}

.recipient {
    position: absolute;
    left: {{ spec.recipient.x }}in;
    bottom: {{ spec.recipient.y }}in;
    width: {{ spec.recipient.w }}in;
    height: {{ spec.recipient.h }}in;
    max-width: {{ spec.recipient.w }}in;
    max-height: {{ spec.recipient.h }}in;
    overflow: hidden;
    font-family: "DejaVu Serif", serif;
    font-size: 11pt;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.barcode {
    position: absolute;
    left: {{ spec.barcode.x }}in;
    bottom: {{ spec.barcode.y }}in;
    width: {{ spec.barcode.w }}in;
    height: {{ spec.barcode.h }}in;
    max-width: {{ spec.barcode.w }}in;
    max-height: {{ spec.barcode.h }}in;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

.bars {
    font-family: "USPSIMBStandard";
    font-size: 16pt;
    line-height: 1;
}

.hr-digits {
    font-family: "DejaVu Serif", serif;
    font-size: 7pt;
    margin-bottom: 1pt;
}

</style>
<body>
    <div class="envelope">
        <div class="sender">
            {% for line in sender_lines %}{{ line }}<br/>{% endfor %}
        </div>
        <div class="recipient">
            {% for line in recipient_lines %}{{ line }}<br/>{% endfor %}
        </div>
        <div class="barcode">
            {% if human_readable %}<div class="hr-digits">{{ human_readable_text }}</div>{% endif %}
            <div class="bars">{{ barcode_bars }}</div>
        </div>
    </div>
</body>
</html>
